# Site settings
title: JP Chavat
description: >-
  Senior Engineer turned Agentic Engineer (MSc). Building autonomous AI systems
  at the intersection of agentic AI, data analysis, and economics.
author: JP Chavat
lang: en

# URLs
email: hey@jpchavat.com
baseurl: ""
url: "https://jpchavat.com"

# Social
twitter_username: jpchavat
github_username: jpchavat
linkedin_username: jpchavat

# SEO / Open Graph
logo: /assets/avatar.jpg
image: /assets/og-image.jpg
twitter:
  username: jpchavat
  card: summary_large_image
social:
  name: JP Chavat
  links:
    - https://www.linkedin.com/in/jpchavat
    - https://github.com/jpchavat

# Build
markdown: kramdown
permalink: /:year/:month/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "en"
      image: /assets/og-image.jpg
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      lang: "en"
      image: /assets/og-image.jpg
